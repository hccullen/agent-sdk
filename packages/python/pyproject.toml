[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "corti-agent-sdk"
version = "0.1.0a0"
description = "Developer-friendly wrapper for building agents with the Corti API"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.9",
]

[tool.hatch.build.targets.wheel]
packages = ["corti_agent_sdk"]

[tool.mypy]
python_version = "3.9"
strict = true
